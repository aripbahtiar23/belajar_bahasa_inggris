<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Daily Coach – Arip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14;
  --surface:#141720;
  --card:#1c2030;
  --border:#252a40;
  --green:#4ade80;
  --blue:#60a5fa;
  --yellow:#fbbf24;
  --purple:#a78bfa;
  --red:#f87171;
  --text:#f0f2ff;
  --muted:#636b8a;
  --muted2:#8891b0;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}

/* HEADER */
.header{padding:20px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.header-logo{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--green);}
.header-date{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono',monospace;}

/* HERO */
.hero{padding:20px 16px 16px;}
.hero-greeting{font-size:22px;font-weight:800;line-height:1.2;margin-bottom:4px;}
.hero-greeting span{color:var(--green);}
.hero-sub{font-size:13px;color:var(--muted2);}

/* STREAK BAR */
.streak-bar{margin:0 16px 16px;background:var(--surface);border-radius:14px;padding:14px 16px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.streak-fire{font-size:28px;line-height:1;}
.streak-info{flex:1;}
.streak-num{font-size:20px;font-weight:800;color:var(--yellow);font-family:'JetBrains Mono',monospace;line-height:1;}
.streak-label{font-size:11px;color:var(--muted2);margin-top:2px;}
.week-dots{display:flex;gap:5px;}
.wd{width:28px;height:28px;border-radius:8px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);flex-direction:column;gap:1px;}
.wd span{font-size:11px;line-height:1;}
.wd.done{background:rgba(74,222,128,.12);border-color:var(--green);}
.wd.today{border-color:var(--blue);}

/* TABS */
.tabs{display:flex;gap:0;margin:0 16px 16px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);}
.tab{flex:1;padding:8px 4px;border-radius:9px;border:none;background:transparent;color:var(--muted2);font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;text-align:center;line-height:1.3;}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}

/* PANELS */
.panel{display:none;padding:0 16px;}
.panel.active{display:block;}

/* SECTION LABEL */
.section-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:4px;}

/* ===== CHECKLIST PANEL ===== */
.cal-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none;}
.cal-strip::-webkit-scrollbar{display:none;}
.cal-day{min-width:44px;height:60px;border-radius:12px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.cal-day .cd-name{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
.cal-day .cd-num{font-size:17px;font-weight:800;color:var(--muted2);}
.cal-day.active{background:var(--blue);border-color:var(--blue);}
.cal-day.active .cd-name{color:rgba(255,255,255,.7);}
.cal-day.active .cd-num{color:#fff;}
.cal-day.has-done{border-color:var(--green);}
.cal-day.has-done .cd-num{color:var(--green);}

.task-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;transition:border-color .15s;}
.task-card.done-card{border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.04);}
.task-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.task-check{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0;background:transparent;}
.task-check.checked{background:var(--green);border-color:var(--green);}
.task-meta{flex:1;}
.task-badge{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:20px;margin-bottom:3px;display:inline-block;}
.badge-wajib{background:rgba(251,191,36,.15);color:var(--yellow);}
.badge-bonus{background:rgba(167,139,250,.15);color:var(--purple);}
.task-title{font-size:14px;font-weight:700;color:var(--text);}
.task-title.striked{text-decoration:line-through;color:var(--muted);}
.task-desc{font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:8px;}
.task-example{background:var(--card);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--green);font-family:'JetBrains Mono',monospace;line-height:1.5;}
.task-example em{color:var(--muted2);font-style:normal;font-size:11px;display:block;margin-bottom:3px;}

.progress-bar-wrap{background:var(--surface);border-radius:12px;padding:12px 14px;margin-bottom:14px;border:1px solid var(--border);}
.pb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pb-label{font-size:12px;font-weight:700;color:var(--muted2);}
.pb-pct{font-size:13px;font-weight:800;color:var(--green);font-family:'JetBrains Mono',monospace;}
.pb-track{height:6px;background:var(--card);border-radius:3px;overflow:hidden;}
.pb-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease;}

.complete-banner{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:12px;padding:12px 14px;margin-bottom:14px;text-align:center;display:none;}
.complete-banner.show{display:block;}
.complete-banner .cb-emoji{font-size:28px;margin-bottom:4px;}
.complete-banner .cb-title{font-size:14px;font-weight:800;color:var(--green);}
.complete-banner .cb-sub{font-size:12px;color:var(--muted2);margin-top:2px;}

/* ===== PHRASES PANEL ===== */
.search-box{position:relative;margin-bottom:14px;}
.search-box input{width:100%;padding:11px 14px 11px 38px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .15s;}
.search-box input:focus{border-color:var(--blue);}
.search-box input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}

.cat-block{margin-bottom:12px;}
.cat-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:5px;}
.cat-hdr-icon{font-size:15px;}
.cat-hdr-title{font-size:13px;font-weight:700;flex:1;}
.cat-hdr-count{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.cat-hdr-arr{color:var(--muted);font-size:11px;transition:transform .2s;}
.cat-hdr-arr.open{transform:rotate(180deg);}
.phrase-list{display:none;flex-direction:column;gap:5px;}
.phrase-list.open{display:flex;}
.phrase-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent;}
.phrase-item:active{border-color:var(--blue);}
.pi-en{font-size:13px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;}
.pi-id{font-size:11px;color:var(--muted2);margin-top:2px;}
.pi-blank{font-size:11px;color:var(--blue);margin-top:3px;font-family:'JetBrains Mono',monospace;}

/* ===== VOCAB PANEL ===== */
.vocab-search{position:relative;margin-bottom:14px;}
.vocab-search input{width:100%;padding:11px 14px 11px 38px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .15s;}
.vocab-search input:focus{border-color:var(--purple);}
.vocab-search input::placeholder{color:var(--muted);}
.vocab-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}

.vocab-results{margin-bottom:12px;}
.vocab-result-label{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600;}

.vocab-grp{margin-bottom:12px;}
.vg-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:5px;}
.vg-icon{font-size:15px;}
.vg-title{font-size:13px;font-weight:700;flex:1;}
.vg-count{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.vg-arr{color:var(--muted);font-size:11px;transition:transform .2s;}
.vg-arr.open{transform:rotate(180deg);}
.vocab-list{display:none;flex-direction:column;gap:5px;}
.vocab-list.open{display:flex;}
.vocab-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent;}
.vocab-card:active{border-color:var(--purple);}
.vc-en{font-size:14px;font-weight:700;color:var(--yellow);font-family:'JetBrains Mono',monospace;}
.vc-id{font-size:11px;color:var(--muted2);margin-top:2px;}
.vc-ex{font-size:11px;color:var(--purple);margin-top:4px;font-style:italic;}

.no-result{text-align:center;padding:24px;color:var(--muted);font-size:13px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#0d0f14;font-size:12px;font-weight:800;padding:8px 20px;border-radius:20px;transition:transform .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🇬🇧 Daily Coach</div>
  <div class="header-date" id="header-date"></div>
</div>

<div class="hero">
  <div class="hero-greeting">Halo, <span>Arip</span> 👋</div>
  <div class="hero-sub">Satu kalimat hari ini = satu langkah menuju fluent.</div>
</div>

<div class="streak-bar">
  <div class="streak-fire">🔥</div>
  <div class="streak-info">
    <div class="streak-num" id="streak-num">0</div>
    <div class="streak-label">hari streak</div>
  </div>
  <div class="week-dots" id="week-dots"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('checklist')">✅ Daily</button>
  <button class="tab" onclick="switchTab('phrases')">💬 Phrases</button>
  <button class="tab" onclick="switchTab('vocab')">📖 Vocab</button>
</div>

<!-- CHECKLIST PANEL -->
<div class="panel active" id="panel-checklist">
  <div class="section-label">Pilih Tanggal</div>
  <div class="cal-strip" id="cal-strip"></div>

  <div class="progress-bar-wrap">
    <div class="pb-top">
      <span class="pb-label">Progress hari ini</span>
      <span class="pb-pct" id="pb-pct">0%</span>
    </div>
    <div class="pb-track"><div class="pb-fill" id="pb-fill" style="width:0%"></div></div>
  </div>

  <div class="complete-banner" id="complete-banner">
    <div class="cb-emoji">🎉</div>
    <div class="cb-title">Semua selesai hari ini!</div>
    <div class="cb-sub">Otak lo udah latihan. Besok lanjut lagi.</div>
  </div>

  <div class="section-label">Tugas Wajib</div>
  <div id="tasks-required"></div>

  <div class="section-label" style="margin-top:16px;">Bonus (kalau sempat)</div>
  <div id="tasks-bonus"></div>
</div>

<!-- PHRASES PANEL -->
<div class="panel" id="panel-phrases">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="phrase-search" placeholder="Cari phrase... (misal: meeting, backlog)" oninput="filterPhrases()">
  </div>
  <div id="phrase-container"></div>
</div>

<!-- VOCAB PANEL -->
<div class="panel" id="panel-vocab">
  <div class="vocab-search">
    <span class="vocab-search-icon">🔍</span>
    <input type="text" id="vocab-search" placeholder="Cari vocab... (misal: data, present)" oninput="filterVocab()">
  </div>
  <div id="vocab-search-results"></div>
  <div id="vocab-container"></div>
</div>

<div class="toast" id="toast">Disalin! ✓</div>

<script>
// ================================================================
// DATA
// ================================================================
const REQUIRED_TASKS = [
  {
    id: 'mirror',
    title: 'Mirror Moment',
    desc: 'Di kamar mandi, ngomong 1 kalimat tentang rencana hari ini. Ga perlu sempurna — yang penting mulut bergerak!',
    example: '"Today I need to lead the sprint review meeting."',
    tip: 'Tip: Pakai template dari tab Phrases kalau bingung mau ngomong apa.'
  },
  {
    id: 'listen',
    title: 'Passive Listening 5 menit',
    desc: 'Putar podcast atau YouTube berbahasa Inggris di background sambil kerja. Tujuannya cuma biasain telinga.',
    example: 'Lenny\'s Podcast / Product School / How I Built This',
    tip: 'Tip: Ga harus fokus 100%. Sambil buka Jira atau Notion juga oke.'

  {
    id: 'sentence',

    example: '"Can we align on the priority first?"',
    tip: 'Tip: Buka tab Phrases, tap kartu, ucapkan. 30 detik selesai.'
  },
];

const BONUS_TASKS = [
  {
    id: 'vocab3',
    title: 'Hafalin 3 Vocab Baru',
    desc: 'Buka tab Vocab, pilih 3 kata yang belum familiar, baca contoh kalimatnya.',
    example: 'escalate → triage → root cause',
    tip: 'Tip: Pilih kata yang paling sering muncul di kerjaan lo minggu ini.'
  },
  {
    id: 'shadow',
    title: 'Shadowing 2 menit',
    desc: 'Dengar satu segmen podcast/video, pause, tirukan cara ngomongnya. Fokus ke ritme & intonasi, bukan arti.',
    example: 'Pilih 1-2 kalimat, ulangi sampai terasa natural.',
    tip: 'Tip: YouTube dengan subtitle bahasa Inggris sangat membantu.'
  },
  {
    id: 'journal',
    title: 'One Sentence Journal',
    desc: 'Tulis 1 kalimat bahasa Inggris tentang hari lo di notes HP atau WA ke diri sendiri.',
    example: '"Today I had a tough standup but the team aligned well."',
    tip: 'Tip: Grammar ga perlu sempurna. Yang penting ditulis.'
  },
];

const PHRASES_DATA = [
  {
    icon: "🗓️", title: "Rencana Hari Ini",
    items: [
      { en: "Today I will ___.", id: "Hari ini aku akan ___.", blank: "review the backlog / join a meeting / write the PRD" },
      { en: "Today I need to ___.", id: "Hari ini aku perlu ___.", blank: "finish the feature brief / talk to the dev team" },
      { en: "This morning I have ___ meeting.", id: "Pagi ini aku ada rapat ___.", blank: "a stakeholder / a sprint / a 1-on-1" },

      { en: "Let's stay on track.", id: "Kita tetap fokus ya.", blank: "" },
      { en: "Let's wrap up — any final thoughts?", id: "Kita akhiri — ada yang mau ditambahkan?", blank: "" },
      { en: "The action item for ___ is ___.", id: "Tugas untuk ___ adalah ___.", blank: "you / the team / next sprint" },
      { en: "Let's park that and move on.", id: "Kita tunda dulu dan lanjut.", blank: "" },

      { en: "I'll follow up on this.", id: "Aku akan tindak lanjuti ini.", blank: "" },
      { en: "Can you clarify what you mean by ___?", id: "Bisa jelaskan maksud ___?", blank: "this requirement / the scope / done" },
      { en: "Let me take a note of that.", id: "Biar aku catat itu.", blank: "" },
      { en: "I agree with that point.", id: "Aku setuju dengan poin itu.", blank: "" },
    ]
  },
  {
    icon: "🐛", title: "Bahas Issue",
    items: [
      { en: "What's the root cause of this?", id: "Apa akar masalahnya?", blank: "" },
      { en: "What's the impact?", id: "Apa dampaknya?", blank: "" },
      { en: "We need to triage this first.", id: "Kita perlu sortir ini dulu.", blank: "" },
      { en: "This needs to be escalated.", id: "Ini perlu dieskalasi.", blank: "" },
      { en: "Is there a workaround for now?", id: "Ada solusi sementaranya?", blank: "" },

  {

      { en: "I see a ___ trend in ___.", id: "Aku melihat tren ___ di ___.", blank: "downward / upward" },
      { en: "There's a spike in ___ this week.", id: "Ada lonjakan di ___ minggu ini.", blank: "errors / signups / churn" },

  },
  {
    icon: "🖼️", title: "Presentasi & Slide",
    items: [
      { en: "Let me walk you through this deck.", id: "Biar aku jelaskan slide ini.", blank: "" },
      { en: "The key message here is ___.", id: "Pesan utama di sini adalah ___.", blank: "" },
      { en: "Here's a breakdown of ___.", id: "Ini rincian dari ___.", blank: "the numbers / the roadmap / Q3 results" },

      { en: "Let me highlight ___.", id: "Perlu aku soroti ___.", blank: "this number / this trend / this risk" },
    ]
  },
  {
    icon: "⏸️", title: "Kalau Stuck / Minta Waktu",
    items: [
      { en: "Let me think about that for a second.", id: "Beri aku sebentar untuk berpikir.", blank: "" },

const VOCAB_DATA = [
  {
    icon: "🎙️", title: "Lead & Ikut Meeting",
    words: [
      { en: "facilitate", id: "memimpin/memfasilitasi", ex: "I'll facilitate today's meeting." },

  {

      { en: "insight", id: "temuan penting dari data", ex: "The key insight is that users drop off here." },
      { en: "cohort", id: "kelompok user berdasar waktu", ex: "The April cohort performs better." },
      { en: "funnel", id: "alur konversi user", ex: "There's a big drop in the funnel here." },
      { en: "benchmark", id: "standar perbandingan", ex: "How do we compare to the benchmark?" },
    ]
  },
  {
    icon: "🖼️", title: "Presentasi & Slide",
    words: [
      { en: "deck", id: "kumpulan slide presentasi", ex: "I'm preparing the deck for Friday." },
      { en: "executive summary", id: "ringkasan untuk pimpinan", ex: "Put the key points in the exec summary." },
      { en: "highlight", id: "poin utama yang ditonjolkan", ex: "The highlight of this quarter is growth." },
      { en: "breakdown", id: "rincian / penjelasan per bagian", ex: "Here's a breakdown of the numbers." },
      { en: "narrative", id: "alur cerita presentasi", ex: "We need a clear narrative for this deck." },
      { en: "takeaway", id: "poin yang dibawa pulang audiens", ex: "The main takeaway is we need to pivot." },
      { en: "walk through", id: "menjelaskan step by step", ex: "Let me walk you through the roadmap." },
      { en: "key message", id: "pesan utama", ex: "The key message of this slide is growth." },
    ]
  },
];

// ================================================================
// STATE
// ================================================================
const SK = 'arip_v2';
function getState(){
  try{return JSON.parse(localStorage.getItem(SK))||{checks:{},streak:0};}
  catch{return{checks:{},streak:0};}
}
function saveState(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}

function todayKey(){return new Date().toISOString().slice(0,10);}
function fmtKey(d){return d.toISOString().slice(0,10);}

// ================================================================
// CALENDAR STRIP
// ================================================================
let selectedDate = todayKey();

function buildCalStrip(){
  const strip = document.getElementById('cal-strip');
  strip.innerHTML='';
  const days=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const state=getState();
  const today=new Date();
  for(let i=6;i>=0;i--){
    const d=new Date(today);
    d.setDate(today.getDate()-i);
    const key=fmtKey(d);
    const isToday=key===todayKey();
    const isSelected=key===selectedDate;
    const checks=state.checks[key]||{};
    const hasDone=Object.values(checks).some(v=>v);
    const el=document.createElement('div');
    el.className='cal-day'+(isSelected?' active':'')+(hasDone&&!isSelected?' has-done':'');
    el.innerHTML=`<div class="cd-name">${days[d.getDay()]}</div><div class="cd-num">${d.getDate()}${hasDone&&!isSelected?' ✓':''}</div>`;
    el.onclick=()=>{selectedDate=key;buildCalStrip();renderTasks();};
    strip.appendChild(el);
  }
}

// ================================================================
// TASKS
// ================================================================
function renderTasks(){
  const state=getState();
  const checks=state.checks[selectedDate]||{};
  const allIds=[...REQUIRED_TASKS.map(t=>t.id),...BONUS_TASKS.map(t=>t.id)];
  const doneCount=allIds.filter(id=>checks[id]).length;
  const reqDone=REQUIRED_TASKS.filter(t=>checks[t.id]).length;
  const pct=Math.round(doneCount/allIds.length*100);

  document.getElementById('pb-pct').textContent=pct+'%';
  document.getElementById('pb-fill').style.width=pct+'%';
  const banner=document.getElementById('complete-banner');
  banner.classList.toggle('show', reqDone===REQUIRED_TASKS.length);

  renderTaskGroup('tasks-required', REQUIRED_TASKS, checks, 'wajib');
  renderTaskGroup('tasks-bonus', BONUS_TASKS, checks, 'bonus');
}

function renderTaskGroup(containerId, tasks, checks, type){
  const c=document.getElementById(containerId);
  c.innerHTML='';
  tasks.forEach(t=>{
    const done=!!checks[t.id];
    const card=document.createElement('div');
    card.className='task-card'+(done?' done-card':'');
    card.innerHTML=`
      <div class="task-header">
        <div class="task-check${done?' checked':''}" onclick="toggleTask('${t.id}')">${done?'✓':''}</div>
        <div class="task-meta">
          <div class="task-badge badge-${type}">${type.toUpperCase()}</div>
          <div class="task-title${done?' striked':''}">${t.title}</div>
        </div>
      </div>
      <div class="task-desc">${t.desc}</div>
      <div class="task-example"><em>Contoh / Rekomendasi:</em>${t.example}</div>
    `;
    c.appendChild(card);
  });
}

function toggleTask(id){
  const state=getState();
  if(!state.checks[selectedDate]) state.checks[selectedDate]={};
  state.checks[selectedDate][id]=!state.checks[selectedDate][id];
  // recalculate streak
  state.streak=calcStreak(state.checks);
  saveState(state);
  renderTasks();
  buildCalStrip();
  renderStreak();
}

function calcStreak(checks){
  let streak=0;
  const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);
    d.setDate(today.getDate()-i);
    const key=fmtKey(d);
    const dayChecks=checks[key]||{};
    const reqDone=REQUIRED_TASKS.filter(t=>dayChecks[t.id]).length;
    if(reqDone>0) streak++;
    else if(i>0) break;
  }
  return streak;
}

// ================================================================
// STREAK
// ================================================================
function renderStreak(){
  const state=getState();
  document.getElementById('streak-num').textContent=state.streak;
  const dots=document.getElementById('week-dots');
  dots.innerHTML='';
  const days=['M','S','S','R','K','J','S'];
  const today=new Date();
  for(let i=6;i>=0;i--){
    const d=new Date(today);
    d.setDate(today.getDate()-i);
    const key=fmtKey(d);
    const checks=state.checks[key]||{};
    const done=REQUIRED_TASKS.some(t=>checks[t.id]);
    const isToday=key===todayKey();
    const dot=document.createElement('div');
    dot.className='wd'+(done?' done':'')+(isToday?' today':'');
    dot.innerHTML=`<span style="font-size:8px;color:var(--muted)">${days[d.getDay()]}</span><span>${done?'✅':'·'}</span>`;
    dots.appendChild(dot);
  }
}

// ================================================================
// PHRASES
// ================================================================
function renderPhrases(filter=''){
  const c=document.getElementById('phrase-container');
  c.innerHTML='';
  const q=filter.toLowerCase().trim();
  let anyResult=false;

  PHRASES_DATA.forEach((cat,ci)=>{
    const filtered=q?cat.items.filter(p=>
      p.en.toLowerCase().includes(q)||
      p.id.toLowerCase().includes(q)||
      (p.blank&&p.blank.toLowerCase().includes(q))
    ):cat.items;
    if(!filtered.length) return;
    anyResult=true;

    const block=document.createElement('div');
    block.className='cat-block';
    const hdr=document.createElement('div');
    hdr.className='cat-hdr';
    hdr.innerHTML=`<span class="cat-hdr-icon">${cat.icon}</span><span class="cat-hdr-title">${cat.title}</span><span class="cat-hdr-count">${filtered.length}</span><span class="cat-hdr-arr" id="parr-${ci}">▼</span>`;
    hdr.onclick=()=>togglePhraseGroup(ci);

    const list=document.createElement('div');
    list.className='phrase-list'+((!q&&ci>0)?'':' open');
    list.id=`plist-${ci}`;
    if(!q&&ci>0) document.getElementById&&setTimeout(()=>{},0);

    filtered.forEach(p=>{
      const item=document.createElement('div');
      item.className='phrase-item';
      item.innerHTML=`<div class="pi-en">${p.en}</div><div class="pi-id">${p.id}</div>${p.blank?`<div class="pi-blank">→ ${p.blank}</div>`:''}`;
      item.onclick=()=>copyText(p.en);
      list.appendChild(item);
    });

    block.appendChild(hdr);
    block.appendChild(list);
    c.appendChild(block);

    if(!q&&ci===0) togglePhraseGroupById(`plist-0`,`parr-0`,true);
  });

  if(!anyResult){
    c.innerHTML=`<div class="no-result">Tidak ada phrase yang cocok dengan "<b>${filter}</b>"</div>`;
  }
}

function togglePhraseGroup(ci){
  const list=document.getElementById(`plist-${ci}`);
  const arr=document.getElementById(`parr-${ci}`);
  if(!list) return;
  const open=list.classList.contains('open');
  list.classList.toggle('open',!open);
  arr&&arr.classList.toggle('open',!open);
}

function togglePhraseGroupById(listId,arrId,forceOpen){
  const list=document.getElementById(listId);
  const arr=document.getElementById(arrId);
  if(!list) return;
  list.classList.toggle('open',forceOpen);
  arr&&arr.classList.toggle('open',forceOpen);
}

function filterPhrases(){
  const q=document.getElementById('phrase-search').value;
  renderPhrases(q);
}

// ================================================================
// VOCAB
// ================================================================
function renderVocab(){
  const c=document.getElementById('vocab-container');
  c.innerHTML='';
  document.getElementById('vocab-search-results').innerHTML='';

  VOCAB_DATA.forEach((grp,gi)=>{
    const div=document.createElement('div');
    div.className='vocab-grp';
    const hdr=document.createElement('div');
    hdr.className='vg-hdr';
    hdr.innerHTML=`<span class="vg-icon">${grp.icon}</span><span class="vg-title">${grp.title}</span><span class="vg-count">${grp.words.length} kata</span><span class="vg-arr" id="varr-${gi}">▼</span>`;
    hdr.onclick=()=>toggleVocabGroup(gi);
    const list=document.createElement('div');
    list.className='vocab-list'+(gi===0?' open':'');
    list.id=`vlist-${gi}`;
    grp.words.forEach(w=>{
      list.appendChild(makeVocabCard(w));
    });
    if(gi===0) document.getElementById&&setTimeout(()=>{const a=document.getElementById('varr-0');a&&a.classList.add('open');},0);
    div.appendChild(hdr);
    div.appendChild(list);
    c.appendChild(div);
  });
}

function makeVocabCard(w){
  const card=document.createElement('div');
  card.className='vocab-card';
  card.innerHTML=`<div class="vc-en">${w.en}</div><div class="vc-id">${w.id}</div><div class="vc-ex">"${w.ex}"</div>`;
  card.onclick=()=>copyText(w.en);
  return card;
}

function toggleVocabGroup(gi){
  const list=document.getElementById(`vlist-${gi}`);
  const arr=document.getElementById(`varr-${gi}`);
  if(!list) return;
  const open=list.classList.contains('open');
  list.classList.toggle('open',!open);
  arr&&arr.classList.toggle('open',!open);
}

function filterVocab(){
  const q=document.getElementById('vocab-search').value.toLowerCase().trim();
  const resultBox=document.getElementById('vocab-search-results');
  const mainBox=document.getElementById('vocab-container');

  if(!q){
    resultBox.innerHTML='';
    mainBox.style.display='';
    return;
  }

  mainBox.style.display='none';
  resultBox.innerHTML='';

  const allWords=[];
  VOCAB_DATA.forEach(grp=>grp.words.forEach(w=>allWords.push({...w,group:grp.title})));
  const filtered=allWords.filter(w=>
    w.en.toLowerCase().includes(q)||
    w.id.toLowerCase().includes(q)||
    w.ex.toLowerCase().includes(q)
  );

  if(!filtered.length){
    resultBox.innerHTML=`<div class="no-result">Tidak ada vocab yang cocok dengan "<b>${q}</b>"<br><span style="font-size:11px;color:var(--muted)">Coba cari dalam bahasa Inggris atau Indonesia</span></div>`;
    return;
  }

  const label=document.createElement('div');
  label.className='vocab-result-label';
  label.textContent=`${filtered.length} hasil untuk "${q}"`;
  resultBox.appendChild(label);
  filtered.forEach(w=>resultBox.appendChild(makeVocabCard(w)));
}

// ================================================================
// UTILS
// ================================================================
function copyText(text){
  navigator.clipboard.writeText(text).catch(()=>{});
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['checklist','phrases','vocab'][i]===name);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
}

// ================================================================
// HEADER DATE
// ================================================================
function setHeaderDate(){
  const opts={weekday:'long',year:'numeric',month:'long',day:'numeric'};
  document.getElementById('header-date').textContent=new Date().toLocaleDateString('id-ID',opts);
}

// ================================================================
// INIT
// ================================================================
setHeaderDate();
buildCalStrip();
renderTasks();
renderStreak();
renderPhrases();
renderVocab();

// open first vocab group arrow
setTimeout(()=>{
  const a=document.getElementById('varr-0');
  if(a) a.classList.add('open');
},50);
</script>
