<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Daily Coach – Arip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14;--surface:#141720;--card:#1c2030;--border:#252a40;
  --green:#4ade80;--blue:#60a5fa;--yellow:#fbbf24;--purple:#a78bfa;
  --red:#f87171;--text:#f0f2ff;--muted:#636b8a;--muted2:#8891b0;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

/* HEADER */
.header{padding:20px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.header-logo{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--green);}
.header-date{font-size:11px;color:var(--muted2);font-family:'JetBrains Mono',monospace;}

/* HERO */
.hero{padding:20px 16px 16px;}
.hero-greeting{font-size:22px;font-weight:800;line-height:1.2;margin-bottom:4px;}
.hero-greeting span{color:var(--green);}
.hero-sub{font-size:13px;color:var(--muted2);}

/* STREAK BAR */
.streak-bar{margin:0 16px 16px;background:var(--surface);border-radius:14px;padding:14px 16px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.streak-fire{font-size:28px;line-height:1;}
.streak-info{flex:1;}
.streak-num{font-size:20px;font-weight:800;color:var(--yellow);font-family:'JetBrains Mono',monospace;line-height:1;}
.streak-label{font-size:11px;color:var(--muted2);margin-top:2px;}
.week-dots{display:flex;gap:5px;}
.wd{width:28px;height:28px;border-radius:8px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);flex-direction:column;gap:1px;}
.wd span{font-size:11px;line-height:1;}
.wd.done{background:rgba(74,222,128,.12);border-color:var(--green);}
.wd.today{border-color:var(--blue);}

/* TABS */
.tabs{display:flex;gap:0;margin:0 16px 16px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);}
.tab{flex:1;padding:8px 4px;border-radius:9px;border:none;background:transparent;color:var(--muted2);font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;text-align:center;line-height:1.3;}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}

/* PANELS */
.panel{display:none;padding:0 16px;}
.panel.active{display:block;}

/* SECTION LABEL */
.section-label{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:4px;}

/* ===== LEVEL PROGRESS ===== */
.level-progress{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px;}
.lp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.lp-phase{font-size:11px;font-weight:700;color:var(--muted2);}
.lp-nums{font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--blue);}
.lp-track{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:8px;}
.lp-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px;transition:width .4s ease;}
.lp-phase-dots{display:flex;gap:4px;margin-top:8px;}
.lp-pd{flex:1;height:3px;border-radius:2px;background:var(--card);}
.lp-pd.active{background:var(--blue);}
.lp-pd.done{background:var(--green);}

/* ===== MISSION PATH ===== */
.phase-section{margin-bottom:8px;}
.phase-hdr{display:flex;align-items:center;gap:8px;padding:8px 0 6px;cursor:pointer;}
.phase-badge{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.pb-1{background:rgba(96,165,250,.15);color:var(--blue);}
.pb-2{background:rgba(167,139,250,.15);color:var(--purple);}
.pb-3{background:rgba(251,191,36,.15);color:var(--yellow);}
.pb-4{background:rgba(74,222,128,.15);color:var(--green);}
.phase-hdr-title{font-size:12px;font-weight:700;flex:1;color:var(--muted2);}
.phase-hdr-arr{color:var(--muted);font-size:10px;transition:transform .2s;}
.phase-hdr-arr.open{transform:rotate(180deg);}
.phase-missions{display:none;}
.phase-missions.open{display:block;}

.mission-path{position:relative;padding-left:34px;}
.mission-path::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--border);border-radius:1px;}

.mission-item{position:relative;margin-bottom:8px;}
.mission-dot{position:absolute;left:-23px;top:13px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--border);background:var(--card);z-index:1;flex-shrink:0;}
.mission-dot.mdone{background:var(--green);border-color:var(--green);}
.mission-dot.mcurrent{background:var(--blue);border-color:var(--blue);animation:mpulse 2s infinite;}
.mission-dot.mlocked{opacity:.4;}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(96,165,250,.5);}60%{box-shadow:0 0 0 6px rgba(96,165,250,0);}}

.mission-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s;}
.mission-card.mdone{border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.02);}
.mission-card.mcurrent{border-color:var(--blue);}
.mission-card.mlocked{opacity:.45;pointer-events:none;}

.mission-card-hdr{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.mc-num{font-size:9px;font-weight:800;color:var(--muted);font-family:'JetBrains Mono',monospace;min-width:28px;}
.mc-info{flex:1;}
.mc-focus{font-size:13px;font-weight:700;line-height:1.2;}
.mc-week{font-size:10px;color:var(--muted);margin-top:1px;}
.mc-icon{font-size:15px;}

.mission-body{padding:0 12px 12px;border-top:1px solid var(--border);}
.mb-task{font-size:13px;color:var(--text);line-height:1.65;padding:10px 0 8px;}
.mb-entry{font-size:11px;color:var(--green);background:rgba(74,222,128,.08);border-radius:7px;padding:6px 10px;margin-bottom:12px;font-family:'JetBrains Mono',monospace;line-height:1.5;}

/* ACTION AREAS */
.action-area{}
.action-textarea{width:100%;min-height:80px;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;resize:vertical;outline:none;transition:border-color .15s;line-height:1.5;display:block;}
.action-textarea:focus{border-color:var(--blue);}
.action-textarea::placeholder{color:var(--muted);}

.shadow-text-box{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.shadow-text{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--yellow);line-height:1.6;flex:1;}

.external-note{background:var(--card);border-radius:9px;padding:10px 12px;font-size:12px;color:var(--muted2);margin-bottom:10px;line-height:1.6;}

.listen-box{background:var(--card);border-radius:9px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.listen-timer{font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--blue);min-width:56px;}
.listen-info{flex:1;font-size:12px;color:var(--muted2);line-height:1.5;}

.record-area{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
audio{width:100%;height:36px;border-radius:8px;}

.btn-ac{width:100%;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;margin-top:4px;}
.btn-record-start{background:rgba(248,113,113,.15);color:var(--red);}
.btn-record-stop{background:var(--red);color:#fff;}
.btn-listen-go{background:rgba(96,165,250,.15);color:var(--blue);}
.btn-done{background:var(--green);color:#0d0f14;opacity:.35;pointer-events:none;margin-top:8px;}
.btn-done.ready{opacity:1;pointer-events:auto;}
.btn-done-review{background:var(--card);border:1px solid var(--border);color:var(--muted2);margin-top:6px;font-size:12px;}
.done-answer-wrap{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-top:4px;}
.done-answer-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.done-answer-text{font-size:13px;color:var(--text);line-height:1.65;}
.done-answer-empty{font-size:12px;color:var(--muted);font-style:italic;}
.btn-grammar{background:rgba(167,139,250,.12);color:var(--purple);margin-top:6px;}
.grammar-result{margin-top:8px;}
.grammar-ok{font-size:12px;color:var(--green);padding:8px 10px;background:rgba(74,222,128,.08);border-radius:8px;font-weight:700;}
.grammar-checking{font-size:12px;color:var(--muted);padding:8px 10px;text-align:center;}
.grammar-error-item{background:var(--card);border:1px solid rgba(248,113,113,.3);border-radius:9px;padding:10px 12px;margin-bottom:6px;}
.ge-original{font-size:12px;color:var(--red);font-family:'JetBrains Mono',monospace;margin-bottom:3px;text-decoration:line-through;}
.ge-msg{font-size:11px;color:var(--muted2);margin-bottom:6px;line-height:1.5;}
.ge-suggestions{display:flex;flex-wrap:wrap;gap:5px;}
.ge-sug{font-size:12px;font-weight:700;color:#0d0f14;background:var(--green);padding:3px 10px;border-radius:20px;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;}
.ge-sug:active{opacity:.8;}

/* SPEAK BUTTON */
.speak-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:6px;color:var(--muted);transition:color .15s;flex-shrink:0;line-height:1;}
.speak-btn:hover,.speak-btn:active{color:var(--blue);}
.speak-btn.speaking{color:var(--blue);}
.vc-ph{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;letter-spacing:.3px;}

/* ===== PHRASES PANEL ===== */
.search-box{position:relative;margin-bottom:14px;}
.search-box input{width:100%;padding:11px 14px 11px 38px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .15s;}
.search-box input:focus{border-color:var(--blue);}
.search-box input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}
.cat-block{margin-bottom:12px;}
.cat-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:5px;}
.cat-hdr-icon{font-size:15px;}
.cat-hdr-title{font-size:13px;font-weight:700;flex:1;}
.cat-hdr-count{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.cat-hdr-arr{color:var(--muted);font-size:11px;transition:transform .2s;}
.cat-hdr-arr.open{transform:rotate(180deg);}
.phrase-list{display:none;flex-direction:column;gap:5px;}
.phrase-list.open{display:flex;}
.phrase-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent;}
.phrase-item:active{border-color:var(--blue);}
.pi-en{font-size:13px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;}
.pi-id{font-size:11px;color:var(--muted2);margin-top:2px;}
.pi-blank{font-size:11px;color:var(--blue);margin-top:3px;font-family:'JetBrains Mono',monospace;}

/* ===== VOCAB PANEL ===== */
.vocab-search{position:relative;margin-bottom:14px;}
.vocab-search input{width:100%;padding:11px 14px 11px 38px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .15s;}
.vocab-search input:focus{border-color:var(--purple);}
.vocab-search input::placeholder{color:var(--muted);}
.vocab-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}
.vocab-results{margin-bottom:12px;}
.vocab-result-label{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600;}
.vocab-grp{margin-bottom:12px;}
.vg-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:5px;}
.vg-icon{font-size:15px;}
.vg-title{font-size:13px;font-weight:700;flex:1;}
.vg-count{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.vg-arr{color:var(--muted);font-size:11px;transition:transform .2s;}
.vg-arr.open{transform:rotate(180deg);}
.vocab-list{display:none;flex-direction:column;gap:5px;}
.vocab-list.open{display:flex;}
.vocab-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent;}
.vocab-card:active{border-color:var(--purple);}
.vc-en{font-size:14px;font-weight:700;color:var(--yellow);font-family:'JetBrains Mono',monospace;}
.vc-id{font-size:11px;color:var(--muted2);margin-top:2px;}
.vc-ex{font-size:11px;color:var(--purple);margin-top:4px;font-style:italic;}
.no-result{text-align:center;padding:24px;color:var(--muted);font-size:13px;}

/* TRANSLATE */
.online-search-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:4px;}
.translate-lang-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tlang{font-size:12px;font-weight:700;color:var(--muted2);}
.btn-swap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 10px;color:var(--blue);font-size:14px;cursor:pointer;font-weight:800;}
.btn-swap:active{opacity:.7;}
.translate-input{width:100%;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;resize:none;line-height:1.5;transition:border-color .15s;}
.translate-input:focus{border-color:var(--green);}
.translate-input::placeholder{color:var(--muted);}
.btn-online-search{padding:10px 16px;background:var(--green);color:#0d0f14;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;flex-shrink:0;}
.btn-online-search:active{opacity:.8;}
.translate-result-card{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;}
.tr-result-text{font-size:15px;font-weight:700;color:var(--green);line-height:1.6;font-family:'JetBrains Mono',monospace;}
.tr-result-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.tr-loading{text-align:center;padding:16px;color:var(--muted);font-size:13px;}
.tr-error{text-align:center;padding:14px;color:var(--red);font-size:13px;}
.tr-copy-hint{font-size:10px;color:var(--muted);margin-top:6px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#0d0f14;font-size:12px;font-weight:800;padding:8px 20px;border-radius:20px;transition:transform .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.level-up{background:var(--blue);color:#fff;font-size:13px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🇬🇧 Daily Coach</div>
  <div class="header-date" id="header-date"></div>
</div>
<div class="hero">
  <div class="hero-greeting">Halo, <span>Arip</span> 👋</div>
  <div class="hero-sub">Satu misi hari ini = satu langkah menuju fluent.</div>
</div>
<div class="streak-bar">
  <div class="streak-fire">🔥</div>
  <div class="streak-info">
    <div class="streak-num" id="streak-num">0</div>
    <div class="streak-label">hari streak</div>
  </div>
  <div class="week-dots" id="week-dots"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('misi')">🎯 Misi</button>
  <button class="tab" onclick="switchTab('phrases')">💬 Phrases</button>
  <button class="tab" onclick="switchTab('vocab')">📖 Vocab</button>
</div>

<!-- MISI PANEL -->
<div class="panel active" id="panel-misi">
  <div id="level-progress-wrap"></div>
  <div id="mission-path-wrap"></div>
</div>

<!-- PHRASES PANEL -->
<div class="panel" id="panel-phrases">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="phrase-search" placeholder="Cari phrase... (misal: meeting, backlog)" oninput="filterPhrases()">
  </div>
  <div id="phrase-container"></div>
</div>

<!-- VOCAB PANEL -->
<div class="panel" id="panel-vocab">
  <!-- Translate -->
  <div class="online-search-wrap">
    <div class="translate-lang-row">
      <span class="tlang active" id="tlang-label">🇮🇩 Indonesia → 🇬🇧 English</span>
      <button class="btn-swap" onclick="swapLang()" title="Balik arah">⇄</button>
    </div>
    <textarea id="translate-input" class="translate-input" placeholder="Ketik teks yang mau diterjemahkan..." rows="2" onkeydown="if(event.ctrlKey&&event.key==='Enter')doTranslate()"></textarea>
    <button class="btn-online-search" onclick="doTranslate()" style="width:100%;margin-top:8px;">Terjemahkan</button>
    <div id="translate-result"></div>
  </div>
  <!-- Local vocab search -->
  <div class="vocab-search" style="margin-top:8px;">
    <span class="vocab-search-icon">🔍</span>
    <input type="text" id="vocab-search" placeholder="Filter vocab tersimpan..." oninput="filterVocab()">
  </div>
  <div id="vocab-search-results"></div>
  <div id="vocab-container"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ================================================================
// MISSIONS DATA
// ================================================================
const PHASE_NAMES = {
  1: 'Phase 1 — Ear Training & Pronunciation',
  2: 'Phase 2 — Low-Stakes Speaking',
  3: 'Phase 3 — PM Scenarios I',
  4: 'Phase 4 — PM Scenarios II & Real Exposure'
};

const MISSIONS = [
  // ── PHASE 1 · WEEK 1 ──────────────────────────────────────────
  {id:1,ph:1,wk:1,dy:1,focus:'Mindset',
   task:'Tulis 1 kalimat bahasa Inggris tentang harimu di kerjaan. Tidak perlu benar.',
   entry:'1 kalimat, boleh salah grammar',
   action:'write',prompt:'Tulis kalimatmu di sini...'},
  {id:2,ph:1,wk:1,dy:2,focus:'Listening Pasif',
   task:'Dengarkan 5 menit podcast/video English (topik bebas) sambil kerja santai.',
   entry:'Cukup dengar, tidak perlu paham semua',
   action:'listen',mins:5},
  {id:3,ph:1,wk:1,dy:3,focus:'Speaking Micro',
   task:'Rekam suaramu: "Today I worked on ___" — isi dengan pekerjaan harianmu.',
   entry:'1 kalimat, boleh diulang berkali-kali',
   action:'record'},
  {id:4,ph:1,wk:1,dy:4,focus:'Shadowing Intro',
   task:'Putar kalimat di bawah, tirukan persis nada & lafalnya, minimal 3x.',
   entry:'Fokus ke ritme & intonasi, bukan arti',
   action:'shadow',stext:'Today I need to review the backlog.'},
  {id:5,ph:1,wk:1,dy:5,focus:'Vocab Kerja',
   task:'Tulis 3 istilah PM yang sering kamu pakai dalam Bahasa Indonesia, lalu cari padanan Inggrisnya.',
   entry:'3 kata cukup',
   action:'write',prompt:'Contoh: rencana = roadmap. Tuliskan 3 istilahmu:'},
  {id:6,ph:1,wk:1,dy:6,focus:'Review Ringan',
   task:'Baca ulang semua yang kamu tulis & rekam minggu ini. Ucapkan pelan-pelan satu per satu.',
   entry:'Baca dalam hati juga oke',
   action:'reflect',prompt:'Tulis 1 hal yang terasa paling mudah minggu ini:'},
  {id:7,ph:1,wk:1,dy:7,focus:'Refleksi',
   task:'Tulis 1 kalimat tentang hal yang paling mudah minggu ini.',
   entry:'Boleh dalam Bahasa Indonesia',
   action:'write',prompt:'Hal termudah minggu ini:'},

  // ── PHASE 1 · WEEK 2 ──────────────────────────────────────────
  {id:8,ph:1,wk:2,dy:1,focus:'Minimal Pairs',
   task:'Latih 3 pasang bunyi yang sering ketuker: ship/sheep, think/sink, live/leave. Tap 🔊 dengar, lalu tirukan.',
   entry:'Dengar bedanya dulu, belum perlu bisa ucapkan',
   action:'shadow',stext:'ship — sheep — think — sink — live — leave'},
  {id:9,ph:1,wk:2,dy:2,focus:'Shadowing',

const SK = 'arip_v3';
function getState(){
  try{return JSON.parse(localStorage.getItem(SK))||{completed:[],inputs:{},timestamps:{},streak:0};}
  catch{return{completed:[],inputs:{},timestamps:{},streak:0};}
}
function saveState(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}
function todayKey(){return new Date().toISOString().slice(0,10);}
function fmtKey(d){return d.toISOString().slice(0,10);}

function renderDoneView(m, state){
  const saved=(state.inputs&&state.inputs[m.id])||'';
  if(m.action==='write'||m.action==='reflect'){
    return saved
      ? `<div class="done-answer-wrap">
           <div class="done-answer-label">Jawaban kamu:</div>
           <div class="done-answer-text">${saved.replace(/\n/g,'<br>')}</div>
           <div id="grammar-result-done-${m.id}" class="grammar-result" style="margin-top:8px;"></div>
           <button class="btn-ac btn-grammar" style="margin-top:6px;" onclick="checkGrammarText(${m.id},'${saved.replace(/'/g,"\\'").replace(/\n/g,' ')}')">🔍 Cek Grammar</button>
         </div>`
      : `<div class="done-answer-wrap done-answer-empty">Tidak ada jawaban tersimpan.</div>`;
  }
  if(m.action==='record'){
    return `<div class="done-answer-wrap done-answer-empty">🎤 Rekaman tidak tersimpan setelah refresh — tapi misi sudah tercatat selesai.</div>`;
  }
  if(m.action==='shadow'){
    return `<div class="done-answer-wrap"><div class="done-answer-label">Kalimat yang di-shadow:</div><div class="done-answer-text" style="color:var(--yellow);font-family:'JetBrains Mono',monospace;">${m.stext}</div></div>`;
  }
  if(m.action==='listen'){
    return `<div class="done-answer-wrap done-answer-empty">✅ ${m.mins} menit listening selesai.</div>`;
  }
  if(m.action==='external'){
    return `<div class="done-answer-wrap done-answer-empty">✅ Sesi eksternal selesai.</div>`;
  }
  return '';
}

function getCurrentMissionId(){
  const s=getState();
  const done=new Set(s.completed);
  const m=MISSIONS.find(m=>!done.has(m.id));
  return m?m.id:null;
}

function renderMissionPanel(){
  const state=getState();
  const done=new Set(state.completed);
  const currentId=getCurrentMissionId();

  // level progress
  const wrap=document.getElementById('level-progress-wrap');
  const pct=Math.round(done.size/112*100);
  const currentM=currentId?MISSIONS.find(m=>m.id===currentId):null;
  const phaseName=currentM?PHASE_NAMES[currentM.ph]:'Kurikulum Selesai! 🎓';
  wrap.innerHTML=`
    <div class="level-progress">
      <div class="lp-top">
        <span class="lp-phase">${phaseName}</span>
        <span class="lp-nums">${done.size}/112</span>
      </div>
      <div class="lp-track"><div class="lp-fill" style="width:${pct}%"></div></div>
      <div class="lp-phase-dots">
        ${[1,2,3,4].map(p=>{
          const phMissions=MISSIONS.filter(m=>m.ph===p);
          const phDone=phMissions.filter(m=>done.has(m.id)).length;
          const cls=phDone===phMissions.length?'done':(phMissions.some(m=>!done.has(m.id))&&currentM&&currentM.ph===p?'active':'');
          return `<div class="lp-pd ${cls}" title="Phase ${p}"></div>`;
        }).join('')}
      </div>
    </div>`;

  // mission path
  const pathWrap=document.getElementById('mission-path-wrap');
  pathWrap.innerHTML='';

  [1,2,3,4].forEach(ph=>{
    const phMissions=MISSIONS.filter(m=>m.ph===ph);
    const phDone=phMissions.filter(m=>done.has(m.id)).length;
    const isCurrentPhase=currentM&&currentM.ph===ph;
    const isLocked=!isCurrentPhase&&phDone<phMissions.length&&(!currentM||ph>currentM.ph);

    const sec=document.createElement('div');
    sec.className='phase-section';

    const hdr=document.createElement('div');
    hdr.className='phase-hdr';
    hdr.innerHTML=`
      <span class="phase-badge pb-${ph}">Phase ${ph}</span>
      <span class="phase-hdr-title">${['Ear Training','Low-Stakes Speaking','PM Scenarios I','Real Exposure'][ph-1]} · ${phDone}/${phMissions.length}</span>
      <span class="phase-hdr-arr ${isCurrentPhase||phDone===phMissions.length?'open':''}" id="pharr-${ph}">▼</span>`;
    hdr.onclick=()=>togglePhase(ph);

    const missions=document.createElement('div');
    missions.className='phase-missions'+(isCurrentPhase||phDone===phMissions.length?' open':'');
    missions.id=`phase-${ph}`;

    const path=document.createElement('div');
    path.className='mission-path';

    phMissions.forEach(m=>{
      const isDone=done.has(m.id);
      const isCurrent=m.id===currentId;
      const status=isDone?'mdone':isCurrent?'mcurrent':'mlocked';
      const icon=isDone?'✅':isCurrent?'▶':'🔒';

      const item=document.createElement('div');
      item.className='mission-item';
      item.id=`mitem-${m.id}`;

      item.innerHTML=`
        <div class="mission-dot ${status}">${isDone?'✓':isCurrent?'▶':''}</div>
        <div class="mission-card ${status}">
          <div class="mission-card-hdr" id="mhdr-${m.id}">
            <span class="mc-num">#${m.id}</span>
            <div class="mc-info">
              <div class="mc-focus">${m.focus}</div>
              <div class="mc-week">Week ${m.wk} · Day ${m.dy}</div>
            </div>
            <span class="mc-icon">${icon}</span>
          </div>
          ${(isCurrent||isDone)?`<div class="mission-body" id="mbody-${m.id}" style="${isDone?'display:none':''}">
            <div class="mb-task">${m.task}</div>
            <div class="mb-entry">${m.entry}</div>
            ${isDone ? renderDoneView(m, state) : `<div class="action-area" id="action-${m.id}"></div>`}
          </div>`:''}
        </div>`;

      path.appendChild(item);
      missions.appendChild(path);

      // toggle done missions
      if(isDone){
        item.querySelector(`#mhdr-${m.id}`).onclick=()=>{
          const body=document.getElementById(`mbody-${m.id}`);
          if(body) body.style.display=body.style.display==='none'?'':'none';
        };
      }
    });

    sec.appendChild(hdr);
    sec.appendChild(missions);
    pathWrap.appendChild(sec);
  });

  // init action area for current mission
  if(currentId){
    const m=MISSIONS.find(x=>x.id===currentId);
    if(m) initActionArea(m);
    // scroll to current
    setTimeout(()=>{
      const el=document.getElementById(`mitem-${currentId}`);
      if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
    },100);
  }
}

function togglePhase(ph){
  const el=document.getElementById(`phase-${ph}`);
  const arr=document.getElementById(`pharr-${ph}`);
  if(!el) return;
  const open=el.classList.contains('open');
  el.classList.toggle('open',!open);
  arr&&arr.classList.toggle('open',!open);
}

function initActionArea(m){
  const area=document.getElementById(`action-${m.id}`);
  if(!area) return;
  const state=getState();
  const savedInput=state.inputs[m.id]||'';

  if(m.action==='write'||m.action==='reflect'){
    area.innerHTML=`
      <textarea class="action-textarea" id="ainput-${m.id}" placeholder="${m.prompt||'Tulis di sini...'}">${savedInput}</textarea>
      <button class="btn-ac btn-done ${savedInput.length>=3?'ready':''}" id="abtn-${m.id}" onclick="completeMission(${m.id})">✓ Tandai Selesai</button>`;
    const ta=document.getElementById(`ainput-${m.id}`);
    ta.addEventListener('paste',e=>{e.preventDefault();showToast('Harus ketik manual ✍️');});
    ta.addEventListener('drop',e=>{e.preventDefault();showToast('Harus ketik manual ✍️');});
    ta.oninput=()=>{
      const val=ta.value.trim();
      const s=getState(); s.inputs[m.id]=ta.value; saveState(s);
      document.getElementById(`abtn-${m.id}`).classList.toggle('ready',val.length>=3);
    };

  } else if(m.action==='record'){
    area.innerHTML=`
      <div class="record-area">
        <button class="btn-ac btn-record-start" id="abtn-rec-${m.id}" onclick="toggleRecord(${m.id})">🎤 Mulai Rekam</button>
        <div id="aplayer-${m.id}"></div>
      </div>
      <button class="btn-ac btn-done" id="abtn-${m.id}" onclick="completeMission(${m.id})">✓ Tandai Selesai</button>`;
    if(_audioURLs[m.id]) showAudioPlayer(m.id, _audioURLs[m.id]);

  } else if(m.action==='listen'){
    const mins=m.mins||5;
    area.innerHTML=`
      <div class="listen-box">
        <div class="listen-timer" id="timer-${m.id}">${mins}:00</div>
        <div class="listen-info" id="linfo-${m.id}">Timer ${mins} menit. Putar kontenmu, lalu tap Mulai.</div>
      </div>
      <button class="btn-ac btn-listen-go" onclick="startListenTimer(${m.id},${mins})">▶ Mulai Timer</button>
      <button class="btn-ac btn-done" id="abtn-${m.id}" onclick="completeMission(${m.id})">✓ Tandai Selesai</button>`;

  } else if(m.action==='shadow'){
    area.innerHTML=`
      <div class="shadow-text-box">
        <span class="shadow-text">${m.stext}</span>
        <button class="speak-btn" title="Dengar">🔊</button>
      </div>
      <button class="btn-ac btn-done" id="abtn-${m.id}" onclick="completeMission(${m.id})">✓ Tandai Selesai (setelah tirukan)</button>`;
    const btn=area.querySelector('.speak-btn');
    let played=false;
    btn.onclick=()=>{
      speak(m.stext,btn);
      if(!played){
        played=true;
        setTimeout(()=>document.getElementById(`abtn-${m.id}`)&&document.getElementById(`abtn-${m.id}`).classList.add('ready'),300);
      }
    };
    // shadow always enable selesai (user self-reports)
    const doneBtn=document.getElementById(`abtn-${m.id}`);
    if(doneBtn) doneBtn.classList.add('ready');

  } else if(m.action==='external'){
    area.innerHTML=`
      <div class="external-note">${m.note}</div>
      <button class="btn-ac btn-done ready" id="abtn-${m.id}" onclick="completeMission(${m.id})">✓ Tandai Selesai</button>`;
  }
}

// ================================================================
// RECORD
// ================================================================
async function toggleRecord(mId){
  const btn=document.getElementById(`abtn-rec-${mId}`);
  if(_recorder&&_recorder.state==='recording'){
    _recorder.stop();
    btn.className='btn-ac btn-record-start';
    btn.textContent='🎤 Rekam Ulang';
    return;
  }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    _chunks=[];
    _recorder=new MediaRecorder(stream);
    _recorder.ondataavailable=e=>{if(e.data.size>0)_chunks.push(e.data);};
    _recorder.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(_chunks,{type:'audio/webm'});
      _audioURLs[mId]=URL.createObjectURL(blob);
      showAudioPlayer(mId,_audioURLs[mId]);
      const db=document.getElementById(`abtn-${mId}`);
      if(db) db.classList.add('ready');
    };
    _recorder.start();
    btn.className='btn-ac btn-record-stop';
    btn.textContent='⏹ Stop Rekam';
  } catch(e){
    showToast('Izin mikrofon diperlukan ⚠️');
  }
}

function showAudioPlayer(mId,url){
  const p=document.getElementById(`aplayer-${mId}`);
  if(!p) return;
  p.innerHTML=`<audio class="record-player" controls src="${url}"></audio>`;
}

// ================================================================
// LISTEN TIMER
// ================================================================
function startListenTimer(mId,mins){
  if(_listenIntervals[mId]) clearInterval(_listenIntervals[mId]);
  let remaining=mins*60;
  const timerEl=document.getElementById(`timer-${mId}`);
  const infoEl=document.getElementById(`linfo-${mId}`);
  if(infoEl) infoEl.textContent='Timer berjalan... dengarkan kontenmu.';
  _listenIntervals[mId]=setInterval(()=>{
    remaining--;
    if(timerEl){
      const m=Math.floor(remaining/60),s=remaining%60;
      timerEl.textContent=`${m}:${s.toString().padStart(2,'0')}`;
    }
    if(remaining<=0){
      clearInterval(_listenIntervals[mId]);
      if(timerEl) timerEl.textContent='✓';
      if(infoEl) infoEl.textContent='Selesai! Tandai misi.';
      const db=document.getElementById(`abtn-${mId}`);
      if(db) db.classList.add('ready');
    }
  },1000);
}

// ================================================================
// COMPLETE MISSION
// ================================================================
function completeMission(id){
  const state=getState();
  if(state.completed.includes(id)) return;
  state.completed.push(id);
  state.timestamps[id]=todayKey();
  state.streak=calcStreak(state);
  saveState(state);
  const nextId=state.completed.length<112?
    MISSIONS.find(m=>!state.completed.includes(m.id))?.id:null;
  renderMissionPanel();
  renderStreak();
  if(nextId){
    showToast(`🎉 Misi ${id} selesai! Misi ${nextId} terbuka.`,true);
  } else {
    showToast('🎓 Semua misi selesai! Luar biasa!',true);
  }
}

// ================================================================
// STREAK
// ================================================================
function calcStreak(state){
  const ts=state.timestamps||{};
  const dates=new Set(Object.values(ts));
  let streak=0;
  const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);
    d.setDate(today.getDate()-i);
    if(dates.has(fmtKey(d))) streak++;
    else if(i>0) break;
  }
  return streak;
}

function renderStreak(){
  const state=getState();
  document.getElementById('streak-num').textContent=state.streak;
  const dots=document.getElementById('week-dots');
  dots.innerHTML='';
  const days=['M','S','S','R','K','J','S'];
  const today=new Date();
  const ts=state.timestamps||{};
  const datesWithActivity=new Set(Object.values(ts));
  for(let i=6;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const key=fmtKey(d);
    const done=datesWithActivity.has(key);
    const isToday=key===todayKey();
    const dot=document.createElement('div');
    dot.className='wd'+(done?' done':'')+(isToday?' today':'');
    dot.innerHTML=`<span style="font-size:8px;color:var(--muted)">${days[d.getDay()]}</span><span>${done?'✅':'·'}</span>`;
    dots.appendChild(dot);
  }
}

// ================================================================
// PHRASES
// ================================================================
function renderPhrases(filter=''){
  const c=document.getElementById('phrase-container');
  c.innerHTML='';
  const q=filter.toLowerCase().trim();
  let anyResult=false;
  PHRASES_DATA.forEach((cat,ci)=>{
    const filtered=q?cat.items.filter(p=>p.en.toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||(p.blank&&p.blank.toLowerCase().includes(q))):cat.items;
    if(!filtered.length) return;
    anyResult=true;
    const block=document.createElement('div');
    block.className='cat-block';
    const hdr=document.createElement('div');
    hdr.className='cat-hdr';
    hdr.innerHTML=`<span class="cat-hdr-icon">${cat.icon}</span><span class="cat-hdr-title">${cat.title}</span><span class="cat-hdr-count">${filtered.length}</span><span class="cat-hdr-arr" id="parr-${ci}">▼</span>`;
    hdr.onclick=()=>togglePhraseGroup(ci);
    const list=document.createElement('div');
    list.className='phrase-list'+((!q&&ci>0)?'':' open');
    list.id=`plist-${ci}`;
    filtered.forEach(p=>{
      const item=document.createElement('div');
      item.className='phrase-item';
      item.innerHTML=`
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;">
          <div style="flex:1;">
            <div class="pi-en">${p.en}</div>
            <div class="pi-id">${p.id}</div>
            ${p.blank?`<div class="pi-blank">→ ${p.blank}</div>`:''}
          </div>
          <button class="speak-btn" title="Dengar">🔊</button>
        </div>`;
      const btn=item.querySelector('.speak-btn');
      btn.onclick=(e)=>{e.stopPropagation();speak(p.en,btn);};
      item.onclick=()=>copyText(p.en);
      list.appendChild(item);
    });
    block.appendChild(hdr);
    block.appendChild(list);
    c.appendChild(block);
    if(!q&&ci===0){list.classList.add('open');const a=document.getElementById(`parr-${ci}`);if(a)a.classList.add('open');}
  });
  if(!anyResult) c.innerHTML=`<div class="no-result">Tidak ada phrase cocok dengan "<b>${filter}</b>"</div>`;
}

function togglePhraseGroup(ci){
  const list=document.getElementById(`plist-${ci}`);
  const arr=document.getElementById(`parr-${ci}`);
  if(!list) return;
  const open=list.classList.contains('open');
  list.classList.toggle('open',!open);
  arr&&arr.classList.toggle('open',!open);
}

function filterPhrases(){renderPhrases(document.getElementById('phrase-search').value);}

// VOCAB
// ================================================================
function renderVocab(){
  const c=document.getElementById('vocab-container');
  c.innerHTML='';
  document.getElementById('vocab-search-results').innerHTML='';
  VOCAB_DATA.forEach((grp,gi)=>{
    const div=document.createElement('div');
    div.className='vocab-grp';
    const hdr=document.createElement('div');
    hdr.className='vg-hdr';
    hdr.innerHTML=`<span class="vg-icon">${grp.icon}</span><span class="vg-title">${grp.title}</span><span class="vg-count">${grp.words.length} kata</span><span class="vg-arr" id="varr-${gi}">▼</span>`;
    hdr.onclick=()=>toggleVocabGroup(gi);
    const list=document.createElement('div');
    list.className='vocab-list'+(gi===0?' open':'');
    list.id=`vlist-${gi}`;
    grp.words.forEach(w=>list.appendChild(makeVocabCard(w)));
    if(gi===0) setTimeout(()=>{const a=document.getElementById('varr-0');if(a)a.classList.add('open');},0);
    div.appendChild(hdr);
    div.appendChild(list);
    c.appendChild(div);
  });
}

function makeVocabCard(w){
  const card=document.createElement('div');
  card.className='vocab-card';
  card.innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;">
      <div style="flex:1;">
        <div class="vc-en">${w.en}</div>
        ${w.ph?`<div class="vc-ph">/${w.ph}/</div>`:''}
        <div class="vc-id">${w.id}</div>
        <div class="vc-ex">"${w.ex}"</div>
      </div>
      <button class="speak-btn" title="Dengar">🔊</button>
    </div>`;
  const btn=card.querySelector('.speak-btn');
  btn.onclick=(e)=>{e.stopPropagation();speak(w.en,btn);};
  card.onclick=()=>copyText(w.en);
  return card;
}

function toggleVocabGroup(gi){
  const list=document.getElementById(`vlist-${gi}`);
  const arr=document.getElementById(`varr-${gi}`);
  if(!list) return;
  const open=list.classList.contains('open');
  list.classList.toggle('open',!open);
  arr&&arr.classList.toggle('open',!open);
}

function filterVocab(){
  const q=document.getElementById('vocab-search').value.toLowerCase().trim();
  const resultBox=document.getElementById('vocab-search-results');
  const mainBox=document.getElementById('vocab-container');
  if(!q){resultBox.innerHTML='';mainBox.style.display='';return;}
  mainBox.style.display='none';
  resultBox.innerHTML='';
  const allWords=[];
  VOCAB_DATA.forEach(grp=>grp.words.forEach(w=>allWords.push({...w,group:grp.title})));
  const filtered=allWords.filter(w=>w.en.toLowerCase().includes(q)||w.id.toLowerCase().includes(q)||w.ex.toLowerCase().includes(q));
  if(!filtered.length){
    resultBox.innerHTML=`<div class="no-result">Tidak ada vocab cocok dengan "<b>${q}</b>"</div>`;
    return;
  }
  const label=document.createElement('div');
  label.className='vocab-result-label';
  label.textContent=`${filtered.length} hasil untuk "${q}"`;
  resultBox.appendChild(label);
  filtered.forEach(w=>resultBox.appendChild(makeVocabCard(w)));
}

// ================================================================
// UTILS
// ================================================================
function speak(text,btn){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='en-US';utt.rate=0.85;
  if(btn){
    utt.onstart=()=>{btn.textContent='⏹';btn.classList.add('speaking');};
    utt.onend=()=>{btn.textContent='🔊';btn.classList.remove('speaking');};
    utt.onerror=()=>{btn.textContent='🔊';btn.classList.remove('speaking');};
  }
  window.speechSynthesis.speak(utt);
}

function copyText(text){
  navigator.clipboard.writeText(text).catch(()=>{});
  showToast('Disalin! ✓');
}

let _toastTimer=null;
function showToast(msg,isLevelUp=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(isLevelUp?' level-up':'');
  t.classList.add('show');
  if(_toastTimer) clearTimeout(_toastTimer);

  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));

function setHeaderDate(){

// ================================================================
// GRAMMAR CHECK
// ================================================================
function grammarErrMsg(match, text){
  const original=text.substring(match.offset,match.offset+match.length);
  const cat=match.rule?.category?.id||'';
  const sug=match.replacements[0]?.value||'';
  let penjelasan='Bagian ini perlu diperbaiki.';
  if(cat==='TYPOS'||cat==='SPELLING') penjelasan=`Ejaan kata ini tidak tepat.`;
  else if(cat==='GRAMMAR') penjelasan=`Tata bahasa di sini tidak tepat.`;
  else if(cat==='PUNCTUATION') penjelasan=`Tanda baca perlu diperbaiki.`;
  else if(cat==='CASING') penjelasan=`Huruf besar/kecil perlu diperbaiki.`;
  else if(cat==='CONFUSED_WORDS') penjelasan=`Kata ini sering tertukar dengan kata lain.`;
  else if(cat==='REDUNDANCY') penjelasan=`Ada kata yang berulang/tidak perlu.`;
  return {original, penjelasan};
}

function renderGrammarMatches(matches, text, mId, allowApply){
  return matches.map(m=>{
    const {original, penjelasan}=grammarErrMsg(m, text);
    const sugs=m.replacements.slice(0,3);
    const sugHtml=sugs.length
      ? sugs.map(s=>allowApply
          ? `<button class="ge-sug" onclick="applySuggestion(${mId},${m.offset},${m.length},'${s.value.replace(/'/g,"\\'")}')">✓ ${s.value}</button>`
          : `<span class="ge-sug" style="cursor:default;">✓ ${s.value}</span>`
        ).join('')
      : '';
    return `<div class="grammar-error-item">
      <div class="ge-msg">❌ Kamu menulis: <span style="color:var(--red);font-family:'JetBrains Mono',monospace;">"${original}"</span></div>
      <div class="ge-msg" style="margin-top:3px;">💡 ${penjelasan}</div>
      ${sugHtml?`<div style="margin-top:6px;font-size:11px;color:var(--muted2);">Seharusnya:</div><div class="ge-suggestions">${sugHtml}</div>`:''}
    </div>`;
  }).join('');
}

async function checkGrammar(mId){
  const ta=document.getElementById(`ainput-${mId}`);
  const resultBox=document.getElementById(`grammar-result-${mId}`);
  const text=(ta?.value||'').trim();
  if(!text){resultBox.innerHTML='';return;}
  resultBox.innerHTML='<div class="grammar-checking">Mengecek grammar...</div>';
  try{
    const params=new URLSearchParams({text,language:'en-US'});
    const res=await fetch('https://api.languagetool.org/v2/check',{method:'POST',body:params});
    if(!res.ok) throw new Error();
    const data=await res.json();
    const matches=data.matches||[];
    if(!matches.length){resultBox.innerHTML='<div class="grammar-ok">✓ Tidak ada kesalahan grammar!</div>';return;}
    resultBox.innerHTML=renderGrammarMatches(matches,text,mId,true);
  } catch(e){
    resultBox.innerHTML='<div class="grammar-checking">Gagal cek grammar. Cek koneksi internet.</div>';
  }
}

async function checkGrammarText(mId, text){
  const resultBox=document.getElementById(`grammar-result-done-${mId}`);
  if(!resultBox||!text.trim()) return;
  resultBox.innerHTML='<div class="grammar-checking">🔍 Mengecek grammar...</div>';
  try{
    const params=new URLSearchParams({text:text.trim(),language:'en-US'});
    const res=await fetch('https://api.languagetool.org/v2/check',{method:'POST',body:params});
    if(!res.ok) throw new Error();
    const data=await res.json();
    const matches=data.matches||[];
    if(!matches.length){resultBox.innerHTML='<div class="grammar-ok">✓ Grammar sudah benar!</div>';return;}
    resultBox.innerHTML=renderGrammarMatches(matches,text,mId,false);
  } catch(e){
    resultBox.innerHTML='<div class="grammar-checking">Gagal cek grammar.</div>';
  }
}

function applySuggestion(mId, offset, length, replacement){
  const ta=document.getElementById(`ainput-${mId}`);
  if(!ta) return;
  const before=ta.value.substring(0,offset);
  const after=ta.value.substring(offset+length);
  ta.value=before+replacement+after;
  ta.dispatchEvent(new Event('input'));
  checkGrammar(mId);
}

// ================================================================
// TRANSLATE
// ================================================================
let _translateDir='id|en'; // id→en default

function swapLang(){
  _translateDir=_translateDir==='id|en'?'en|id':'id|en';
  const label=document.getElementById('tlang-label');
  if(label) label.textContent=_translateDir==='id|en'?'🇮🇩 Indonesia → 🇬🇧 English':'🇬🇧 English → 🇮🇩 Indonesia';
  document.getElementById('translate-result').innerHTML='';
}

async function doTranslate(){
  const input=document.getElementById('translate-input');
  const resultBox=document.getElementById('translate-result');
  const text=input.value.trim();
  if(!text) return;

  resultBox.innerHTML='<div class="tr-loading">Menerjemahkan...</div>';

  try{
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${_translateDir}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error();
    const data=await res.json();

    if(data.responseStatus!==200&&data.responseStatus!=='200') throw new Error();

    const translated=data.responseData.translatedText;
    const isEnResult=_translateDir==='id|en';

    resultBox.innerHTML=`
      <div class="translate-result-card">
        <div class="tr-result-row">
          <div class="tr-result-text" id="tr-text">${translated}</div>
          ${isEnResult?`<button class="speak-btn" style="font-size:18px;margin-top:2px;" id="tr-speak">🔊</button>`:''}
        </div>
        <div class="tr-copy-hint">Tap teks untuk salin</div>
      </div>`;

    document.getElementById('tr-text').onclick=()=>copyText(translated);
    if(isEnResult){
      document.getElementById('tr-speak').onclick=()=>speak(translated,document.getElementById('tr-speak'));
    }
  } catch(e){
    resultBox.innerHTML=`<div class="tr-error">Terjemahan gagal. Cek koneksi internet.</div>`;
  }
}
